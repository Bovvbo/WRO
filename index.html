<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        canvas {
            border: solid deepskyblue 5px;
            margin: 30px;
            margin-top: 20px;
            margin-left: 20px;
        }

        #container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-left: 20px;
        }

        #out {
            width: 200px;
        }

        #buttons {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>
    <div id="container">
        <div id="out">
            #WRO
            <br>
        </div>
        <button class="copy" data-copy="#out"><i class="fa-regular fa-copy" id="copy"></i> <span> Copy </span></button>
        <div id="buttons">
            <button id="k1">Kleiner Motor 1 drehen</button>
            <button id="k2">Kleiner Motor 2 drehen</button>
            <button id="k3">Kleiner Motor 3 drehen</button>
            <button id="k4">Kleiner Motor 4 drehen</button>
            <button id="kommentar">Kommentar hinzufügen</button>
        </div>
    </div>

    <script>
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");
        let out = document.getElementById("out");
        let k1 = document.getElementById("k1");
        let k2 = document.getElementById("k2");
        let k3 = document.getElementById("k3");
        let k4 = document.getElementById("k4");
        let kommentar = document.getElementById("kommentar");

        let img = new Image();
        img.src = "WRO2026-RM-Senior-Spielfeldmatte.png";
        let PunkteCounter = 0;

        let points = [];

        function distanceMM(p1, p2) {
            let dx = (p2.x - p1.x) * 2362;
            let dy = (p2.y - p1.y) * 1143;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function angleDirection(A, B, C) {
            let v1x = B.x - A.x;
            let v1y = B.y - A.y;

            let v2x = C.x - B.x;
            let v2y = C.y - B.y;

            let dot = v1x * v2x + v1y * v2y;
            let len1 = Math.sqrt(v1x * v1x + v1y * v1y);
            let len2 = Math.sqrt(v2x * v2x + v2y * v2y);
            let angle = Math.acos(dot / (len1 * len2)) * 180 / Math.PI;


            let cross = v1x * v2y - v1y * v2x;

            if (cross < 0) {
                return -angle;
            } else {
                return angle;
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth - 50;
            canvas.height = canvas.width * 0.484;
            draw();
        }

        function draw() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "blue";
            ctx.lineWidth = 2;

            for (let i = 1; i < points.length; i++) {
                ctx.beginPath();
                ctx.moveTo(points[i - 1].x * canvas.width, points[i - 1].y * canvas.height);
                ctx.lineTo(points[i].x * canvas.width, points[i].y * canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = "red";

            for (let p of points) {
                ctx.beginPath();
                ctx.arc(p.x * canvas.width, p.y * canvas.height, 6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        canvas.addEventListener("click", function (event) {
            let rect = canvas.getBoundingClientRect();

            let x = (event.clientX - rect.left) / canvas.width;
            let y = (event.clientY - rect.top) / canvas.height;

            points.push({ x: x, y: y });

            draw();

            let output = "";

            if (points.length >= 3) {
                let A = points[points.length - 3];
                let B = points[points.length - 2];
                let C = points[points.length - 1];

                let angle = angleDirection(A, B, C);
                if (angle > 5 || angle < -5) {
                    output += "drb_t(" + angle.toFixed(2) + ", 500)\n";
                }
            }

            if (points.length >= 2) {
                let lastDistance = distanceMM(points[points.length - 2], points[points.length - 1]);
                output += "drb_m(" + lastDistance.toFixed(1) + ", 500)\n";
            }
            out.innerHTML += output.replace(/\n/g, "<br>");
        });

        k1.addEventListener("click", function () {
            out.innerHTML += "kmmove1(100,500)\n";
        });
        k2.addEventListener("click", function () {
            out.innerHTML += "kmmove2(100,500)\n";
        });
        k3.addEventListener("click", function () {
            out.innerHTML += "kmmove3(100,500)\n";
        });
        k4.addEventListener("click", function () {
            out.innerHTML += "kmmove4(100,500)\n";
        });
        kommentar.addEventListener("click", function () {
            let comment = prompt("Geben Sie Ihren Kommentar ein:");
            if (comment) {
                out.innerHTML += "# " + comment + "\n";
            }
        });

        document.querySelector(".copy").addEventListener("click", function () {
            let copyText = document.querySelector(this.getAttribute("data-copy")).innerText;
            navigator.clipboard.writeText(copyText).then(function () {
                alert("Copied to clipboard!");
            }, function (err) {
                alert("Failed to copy: ", err);
            });
        });


        img.onload = draw;

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        console.log("Canvas width: " + canvas.width);
        console.log("Canvas height: " + canvas.height);
    </script>
    <script src="https://kit.fontawesome.com/ae107be8e8.js" crossorigin="anonymous"></script>
</body>

</html>
